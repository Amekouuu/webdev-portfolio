<section class="page shell">
  <div class="page__grid">

    <!-- LEFT: Intro -->
    <div class="pageIntro">
      <h1 class="pageIntro__title h-serif">Resume.</h1>
      <span class="pageIntro__rule"></span>
      <p class="pageIntro__blurb">View inline or grab the PDF.</p>

      <button class="resume__download" (click)="download()" type="button">
        <span class="resume__downloadIcon">↓</span>
        Download PDF
      </button>

      <a
        [href]="resumeUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="resume__openLink"
      >
        Open in new tab →
      </a>
    </div>

    <!-- RIGHT: Inline PDF viewer -->
    <div class="resume__viewer">
      <iframe
        [src]="resumeUrl"
        title="Micko Alberto Resume"
        class="resume__iframe"
        loading="lazy"
      ></iframe>
    </div>

  </div>
</section>
